<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc trùng CONST từ JSON</title>
<style>
body { font-family: sans-serif; padding: 20px; }
pre { background: #f4f4f4; padding: 10px; max-height: 200px; overflow-y: auto; }
button { margin-top: 10px; }
</style>
</head>
<body>

<h2>Upload file JSON chứa CONST_1 và CONST_2</h2>
<input type="file" id="fileInput" accept=".txt,.json">
<p>Số lượng CONST 1: <span id="count1">0</span></p>
<p>Số lượng CONST 2: <span id="count2">0</span></p>

<button id="filterBtn">Lọc trùng & Xuất file TXT</button>

<h3>Kết quả trùng</h3>
<p>Số lượng trùng: <span id="countDuplicate">0</span></p>
<pre id="result"></pre>

<script>
let const1 = [];
let const2 = [];

// Đọc file JSON/TXT
document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(event){
    try {
      const data = JSON.parse(event.target.result);
      const1 = data.CONST_1 || [];
      const2 = data.CONST_2 || [];
      document.getElementById('count1').textContent = const1.length;
      document.getElementById('count2').textContent = const2.length;
    } catch(err){
      alert('File không hợp lệ hoặc không phải JSON: ' + err);
    }
  };
  reader.readAsText(file);
});

// Lọc trùng và xuất file
document.getElementById('filterBtn').addEventListener('click', function(){
  if(const1.length === 0 || const2.length === 0){
    alert('Hãy upload file JSON hợp lệ trước');
    return;
  }
  const duplicates = const1.filter(x => const2.includes(x));
  document.getElementById('countDuplicate').textContent = duplicates.length;
  document.getElementById('result').textContent = duplicates.join(', ');

  // Xuất file TXT
  const blob = new Blob([duplicates.join('\n')], {type: 'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ketqua_trung.txt';
  a.click();
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
